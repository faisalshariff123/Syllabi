<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Syllabi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ffb3da;
    --pink-dark: #ff7fc0;
    --cyan: #7ef0ea;
    --cyan-dark: #3fd6ce;
    --ink: #24243e;
    --paper: #fff6fb;
  }

  * { box-sizing: border-box; image-rendering: pixelated; }

  body {
    font-family: "Press Start 2P", monospace;
    background: var(--cyan);
    background-image:
      linear-gradient(var(--cyan-dark) 2px, transparent 2px),
      linear-gradient(90deg, var(--cyan-dark) 2px, transparent 2px);
    background-size: 32px 32px;
    color: var(--ink);
    max-width: 760px;
    margin: 32px auto;
    padding: 0 16px 60px;
    font-size: 12px;
    line-height: 1.6;
  }

  .pixel-box {
    background: var(--paper);
    border: 4px solid var(--ink);
    box-shadow: 8px 8px 0 var(--ink);
    padding: 20px;
    margin-bottom: 24px;
  }

  h1 {
    font-size: 18px;
    text-align: center;
    background: var(--pink);
    border: 4px solid var(--ink);
    box-shadow: 8px 8px 0 var(--ink);
    padding: 18px 12px;
    margin: 0 0 24px;
    text-shadow: 2px 2px 0 var(--paper);
  }

  #upload-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }

  input[type=file] {
    font-family: inherit;
    font-size: 10px;
    border: 3px solid var(--ink);
    background: var(--cyan);
    padding: 8px;
    flex: 1;
    min-width: 180px;
  }

  button {
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    padding: 10px 14px;
    border: 3px solid var(--ink);
    background: var(--pink);
    color: var(--ink);
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform 0.05s, box-shadow 0.05s;
  }
  button:hover:not(:disabled) { background: var(--pink-dark); }
  button:active:not(:disabled) {
    transform: translate(4px, 4px);
    box-shadow: 0 0 0 var(--ink);
  }
  button:disabled { opacity: 0.5; cursor: default; box-shadow: 4px 4px 0 var(--ink); }

  #export-btn, #add-btn { background: var(--cyan); margin-top: 4px; }
  #export-btn:hover:not(:disabled), #add-btn:hover:not(:disabled) { background: var(--cyan-dark); }

  #status {
    font-size: 10px;
    padding: 10px 12px;
    border: 3px solid var(--ink);
    background: var(--cyan);
    margin-bottom: 20px;
    min-height: 14px;
  }
  #status.error { background: var(--pink); }
  #status:empty { display: none; }

  table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  th {
    font-size: 9px;
    text-align: left;
    padding: 8px 6px;
    background: var(--ink);
    color: var(--paper);
  }
  td { padding: 6px; border-bottom: 3px solid var(--ink); background: var(--paper); }

  input[type=text], input[type=date] {
    width: 100%;
    font-family: inherit;
    font-size: 10px;
    border: 2px solid var(--ink);
    background: #fff;
    padding: 6px;
  }

  .row-actions { text-align: center; }
  .delete-btn { background: var(--pink-dark); padding: 6px 10px; box-shadow: 3px 3px 0 var(--ink); }

  .btn-row { display: flex; gap: 12px; flex-wrap: wrap; }
</style>
</head>
<body>

<h1>★ SYLLABI ★</h1>

<div class="pixel-box">
  <div id="upload-row">
    <input type="file" id="file-input" accept="application/pdf">
    <button id="extract-btn">Extract</button>
  </div>
</div>

<div id="status"></div>

<div id="deadlines-wrap" style="display: none;">
  <table id="deadlines-table">
    <thead>
      <tr><th>Title</th><th>Date</th><th>Description</th><th></th></tr>
    </thead>
    <tbody id="deadlines-body"></tbody>
  </table>

  <div class="btn-row">
    <button id="add-btn">+ Add</button>
    <button id="export-btn">↓ Export .ics</button>
  </div>
</div>

<script>
const API = "http://localhost:8000";

const fileInput = document.getElementById("file-input");
const extractBtn = document.getElementById("extract-btn");
const statusEl = document.getElementById("status");
const wrap = document.getElementById("deadlines-wrap");
const tbody = document.getElementById("deadlines-body");
const addBtn = document.getElementById("add-btn");
const exportBtn = document.getElementById("export-btn");

function setStatus(msg, isError = false) {
  statusEl.textContent = msg;
  statusEl.className = isError ? "error" : "";
}

function addRow(deadline = { title: "", date: "", description: "" }) {
  const tr = document.createElement("tr");
  tr.innerHTML = `
    <td><input type="text" class="title" value="${deadline.title ?? ""}"></td>
    <td><input type="date" class="date" value="${deadline.date ?? ""}"></td>
    <td><input type="text" class="description" value="${deadline.description ?? ""}"></td>
    <td class="row-actions"><button class="delete-btn">X</button></td>
  `;
  tr.querySelector(".delete-btn").addEventListener("click", () => tr.remove());
  tbody.appendChild(tr);
}

function showDeadlines(deadlines) {
  tbody.innerHTML = "";
  deadlines.forEach(addRow);
  wrap.style.display = "block";
}

extractBtn.addEventListener("click", async () => {
  const file = fileInput.files[0];
  if (!file) {
    setStatus("Choose a PDF first.", true);
    return;
  }

  extractBtn.disabled = true;
  setStatus("Extracting deadlines...");

  const formData = new FormData();
  formData.append("file", file);

  try {
    const res = await fetch(`${API}/extract`, { method: "POST", body: formData });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || `Request failed (${res.status})`);
    }
    const deadlines = await res.json();
    showDeadlines(deadlines);
    setStatus(`Extracted ${deadlines.length} deadline(s). Review and edit before exporting.`);
  } catch (e) {
    setStatus(e.message, true);
  } finally {
    extractBtn.disabled = false;
  }
});

addBtn.addEventListener("click", () => {
  addRow();
  wrap.style.display = "block";
});

exportBtn.addEventListener("click", async () => {
  const rows = [...tbody.querySelectorAll("tr")];
  const deadlines = rows.map(tr => ({
    title: tr.querySelector(".title").value,
    date: tr.querySelector(".date").value,
    description: tr.querySelector(".description").value || null,
  }));

  if (deadlines.some(d => !d.title || !d.date)) {
    setStatus("Every deadline needs a title and a date.", true);
    return;
  }

  exportBtn.disabled = true;
  setStatus("Exporting...");

  try {
    const res = await fetch(`${API}/export`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ deadlines }),
    });
    if (!res.ok) throw new Error(`Export failed (${res.status})`);

    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "deadlines.ics";
    a.click();
    URL.revokeObjectURL(url);
    setStatus("Downloaded deadlines.ics");
  } catch (e) {
    setStatus(e.message, true);
  } finally {
    exportBtn.disabled = false;
  }
});
</script>

</body>
</html>
